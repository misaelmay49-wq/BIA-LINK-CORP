<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - BIA LINK</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body {
            background: #050a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .card {
            background: linear-gradient(135deg, #003d99, #001a4d);
            width: 100%;
            max-width: 420px;
            border-radius: 20px;
            padding: 35px 25px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.5);
        }
        .header {
            font-size: 22px;
            font-weight: bold;
            color: white;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .header svg { width: 24px; height: 24px; fill: #4d94ff; }
        .icon-circle {
            width: 70px;
            height: 70px;
            border: 2px solid #4d94ff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 15px;
        }
        .icon-circle svg { width: 35px; height: 35px; fill: #4d94ff; }
        .title {
            font-size: 26px;
            font-weight: bold;
            color: white;
            text-align: center;
            margin-bottom: 8px;
        }
        .subtitle {
            color: #8aa4d8;
            font-size: 14px;
            text-align: center;
            margin-bottom: 30px;
            line-height: 1.5;
        }
        .form-group { margin-bottom: 20px; }
        .label { color: white; font-size: 14px; font-weight: 600; margin-bottom: 8px; display: block; }
        .input-box {
            position: relative;
            display: flex;
            align-items: center;
            background: #0a1f4d;
            border-radius: 10px;
        }
        .input-box svg:first-child { 
            position: absolute; 
            left: 14px; 
            width: 18px; 
            height: 18px; 
            fill: #8aa4d8; 
        }
        .input-box .eye { 
            position: absolute; 
            right: 14px; 
            width: 20px; 
            height: 20px; 
            fill: #8aa4d8; 
            cursor: pointer;
        }
        input {
            width: 100%;
            padding: 15px 45px 15px 45px;
            border-radius: 10px;
            border: none;
            background: transparent;
            color: white;
            font-size: 15px;
            outline: none;
        }
        input::placeholder { color: #6a8ac4; }
        .btn {
            background: #0044cc;
            color: white;
            width: 100%;
            padding: 16px;
            border-radius: 10px;
            border: none;
            font-weight: bold;
            font-size: 16px;
            margin-top: 15px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: 0.3s;
        }
        .btn:hover { background: #003399; transform: translateY(-2px); }
        .btn svg { width: 20px; height: 20px; fill: white; }
        .flash { padding: 12px; border-radius: 8px; margin-bottom: 15px; font-size: 14px; }
        .flash.error { background: #ff4d4d; color: white; }
        .flash.success { background: #00cc66; color: white; }
    </style>
    <script>
        function togglePassword(id) {
            var x = document.getElementById(id);
            x.type = x.type === "password" ? "text" : "password";
        }
    </script>
</head>
<body>
    <div class="card">
        <div class="header">
            BIA LINK 
            <svg viewBox="0 0 24 24"><path d="M16 6l2.29 2.29-4.88 4.88-4-4L2 16.59 3.41 18l6-6 4 4 6.3-6.29L22 12V6z"/></svg>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            {% for category, message in messages %}
              <div class="flash {{ category }}">{{ message }}</div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <div class="icon-circle">
            <svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
        </div>

        <div class="title">Iniciar sesión</div>
        <div class="subtitle">Accede a tu cuenta para continuar<br>administrando tu negocio</div>

        <form method="POST" action="{{ url_for('login') }}">
            <div class="form-group">
                <label class="label">Correo electrónico</label>
                <div class="input-box">
                    <svg viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg>
                    <input type="email" name="correo" placeholder="ejemplo@correo.com" required>
                </div>
            </div>

            <div class="form-group">
                <label class="label">Contraseña</label>
                <div class="input-box">
                    <svg viewBox="0 0 24 24"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/></svg>
                    <input type="password" name="password" id="password" placeholder="Ingresa tu contraseña" required>
                    <svg class="eye" onclick="togglePassword('password')" viewBox="0 0 24 24"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>
                </div>
            </div>

            <button type="submit" class="btn">
                <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
                Iniciar sesión
            </button>
            <p style="text-align: center; margin-top: 20px; color: #8aa4d8; font-size: 14px;">
              ¿No tienes cuenta? <a href="{{ url_for('registro') }}" style="color: #4d94ff; font-weight: bold; text-decoration: none;">Créala aquí</a>
            </p>
        </form>
    </div>
</body>
  </html>
